[variables]
NODE_ENV = "production"
STATIC_ROOT = "frontend/dist"

[phases.setup]
nixPkgs = ["nodejs_22", "caddy"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build --workspace frontend"]

[start]
cmd = "cd frontend && node scripts/write-runtime-env.mjs && cd .. && echo \"Static root: $(pwd)/${STATIC_ROOT:-frontend/dist}\" && echo \"dist/assets files:\" && find \"${STATIC_ROOT:-frontend/dist}/assets\" -maxdepth 1 -type f -print | sort && caddy run --config Caddyfile --adapter caddyfile"

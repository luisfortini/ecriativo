[variables]
NODE_ENV = "production"
STATIC_ROOT = "frontend/dist"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build --workspace frontend"]

[start]
cmd = "cd frontend && node scripts/write-runtime-env.mjs && cd .. && node frontend/scripts/serve-static.mjs"

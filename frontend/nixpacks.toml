[variables]
NODE_ENV = "production"
STATIC_ROOT = "dist"

[phases.setup]
nixPkgs = ["nodejs_22", "caddy"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node scripts/write-runtime-env.mjs && echo \"Static root: $(pwd)/${STATIC_ROOT:-dist}\" && echo \"dist/assets files:\" && find \"${STATIC_ROOT:-dist}/assets\" -maxdepth 1 -type f -print | sort && caddy run --config Caddyfile --adapter caddyfile"
